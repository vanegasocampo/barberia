{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="fw-bold mb-0">Barberos</h1>
      <p class="text-muted mb-0">Gestión de barberos registrados</p>
    </div>
    <a href="{% url 'barbero_create' %}" class="btn btn-primary rounded-pill">
      <i class="bi bi-person-plus me-1"></i> Nuevo Barbero
    </a>
  </div>

  {% if object_list %}
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      {% for barbero in object_list %}
        <div class="col">
          <div class="card border-0 shadow-sm h-100 rounded-4">
            <div class="card-body d-flex flex-column justify-content-between">
              <h5 class="card-title">
                <i class="bi bi-person-circle me-2 text-primary"></i>{{ barbero.nombre }}
              </h5>
              <div class="mt-3">
                <a href="{% url 'barbero_update' barbero.id %}"
                   class="btn btn-outline-primary btn-sm px-3 py-1 rounded-pill d-inline-flex align-items-center gap-1"
                   title="Editar barbero">
                  <i class="bi bi-pencil-square"></i> Editar
                </a>
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="alert alert-info mt-4" role="alert">
      No hay barberos registrados todavía.
    </div>
  {% endif %}
</div>
{% endblock %}
