services:
  - type: web
    name: barberia-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: |
      # 1) Genera archivos de migración (no falla si no hay cambios)
      python manage.py makemigrations --no-input

      # 2) Aplica todas las migraciones pendientes
      python manage.py migrate --no-input

      # 3) Crea un superusuario si no existe (usa variables de entorno)
      python manage.py createsuperuser --no-input || true

      # 4) Arranca Gunicorn
      gunicorn barber.wsgi:application
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: barber.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: postgresql://barberia_db_4vmu_user:B3RzUQWUK16eBvy16MHarM30QUQij9St@dpg-d19hf4ripnbc73el5qog-a.ohio-postgres.render.com/barberia_db_4vmu
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@tudominio.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: UnaContraseñaSegura123
