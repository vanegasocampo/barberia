services:
  - type: web
    name: barberia-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: >
      bash -c "
        python manage.py migrate
        gunicorn barber.wsgi:application
      "
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: barber.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
