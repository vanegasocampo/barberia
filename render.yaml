services:
  - type: web
    name: barberia-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: |
      # salir si algo falla
      set -e

      # 1) Ejecuta las migraciones en la base de datos
      python manage.py migrate --no-input

      # 2) (opcional) crea superusuario si no existe
      python manage.py createsuperuser --no-input || true

      # 3) Inicia Gunicorn, ligado al puerto que Render exporta
      gunicorn barber.wsgi:application --bind 0.0.0.0:$PORT

    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: barber.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: postgresql://barberia_db_4vmu_user:B3RzUQWUK16eBvy16MHarM30QUQij9St@dpg-d19hf4ripnbc73el5qog-a.ohio-postgres.render.com/barberia_db_4vmu
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@tudominio.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: UnaContraseñaSegura123
